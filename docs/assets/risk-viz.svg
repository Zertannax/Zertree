<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <rect x="20" y="20" width="460" height="140" rx="12" fill="#12121F" stroke="#1A1A2E" stroke-width="1"/>
  
  <text x="50" y="50" fill="#E0E0E0" font-family="monospace" font-size="16" font-weight="bold">Risk Distribution</text>
  
  <circle cx="80" cy="90" r="10" fill="#FF2A6D">
    <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="105" y="95" fill="#FF2A6D" font-family="monospace" font-size="14">CRITICAL  8 (3%)</text>
  
  <circle cx="80" cy="120" r="8" fill="#F7E018">
    <animate attributeName="r" values="6;11;6" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <text x="105" y="125" fill="#F7E018" font-family="monospace" font-size="14">WARNING  24 (10%)</text>
  
  <circle cx="280" cy="90" r="6" fill="#05D9E8">
    <animate attributeName="r" values="5;9;5" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="95" fill="#05D9E8" font-family="monospace" font-size="14">OK  215 (87%)</text>
  <text x="280" y="125" fill="#8A8AA3" font-family="monospace" font-size="12">Score: 4.2/10.0</text>
</svg>