<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZertTree — SBOM Risk Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0F;
            color: #E0E0E0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #12121F; }
        ::-webkit-scrollbar-thumb { background: #05D9E8; border-radius: 2px; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @media print {
            body {
                background: white !important;
                color: black !important;
                overflow: visible !important;
                height: auto !important;
            }
            #app {
                overflow: visible !important;
                height: auto !important;
            }
            .app-container {
                overflow: visible !important;
                height: auto !important;
            }
            .background-canvas,
            .header-bar button,
            .sidebar,
            .palette,
            .sub-tab-bar,
            .interactive-row:hover,
            ::-webkit-scrollbar {
                display: none !important;
            }
            .dashboard {
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
            }
            .dashboard-grid {
                display: block !important;
            }
            .panel {
                margin-bottom: 20px !important;
                page-break-inside: avoid;
            }
            .panel-content,
            .scrollable-panel {
                max-height: none !important;
                overflow: visible !important;
            }
            .glass-card {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                backdrop-filter: none !important;
                background: white !important;
            }
            .dense-table th {
                background: #eee !important;
                color: #333 !important;
                border-bottom: 2px solid #ccc !important;
            }
            .dense-table td {
                color: #000 !important;
                border-bottom: 1px solid #ddd !important;
            }
            .metric-box, .status-badge, .badge, .compliance-badge {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            * {
                text-shadow: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
