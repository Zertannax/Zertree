<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05D9E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7E018;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2A6D;stop-opacity:1" />
    </linearGradient>
    <filter id="glowFull">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo icon -->
  <g transform="translate(60, 50)">
    <circle cx="40" cy="20" r="15" fill="#05D9E8" filter="url(#glowFull)" opacity="0.9"/>
    <circle cx="15" cy="60" r="12" fill="#FF2A6D" filter="url(#glowFull)" opacity="0.8"/>
    <circle cx="65" cy="60" r="12" fill="#F7E018" filter="url(#glowFull)" opacity="0.8"/>
    <path d="M 40 35 Q 40 48 15 48" stroke="#1A1A2E" stroke-width="3" fill="none"/>
    <path d="M 40 35 Q 40 48 65 48" stroke="#1A1A2E" stroke-width="3" fill="none"/>
    <path d="M 15 72 Q 40 82 65 72" stroke="#1A1A2E" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Brand name -->
  <text x="180" y="115" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" fill="url(#logoGrad)" letter-spacing="-2">
    ZertTree
  </text>
  
  <!-- Tagline -->
  <text x="180" y="145" font-family="'Inter', sans-serif" font-size="18" fill="#8A8AA3" letter-spacing="2">
    SBOM RISK VISUALIZER
  </text>
  
  <!-- Decorative line -->
  <line x1="180" y1="160" x2="400" y2="160" stroke="#1A1A2E" stroke-width="1"/>
</svg>
