<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05D9E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF2A6D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#0A0A0F" stroke="#1A1A2E" stroke-width="2"/>
  
  <!-- Root node (top) -->
  <circle cx="50" cy="25" r="12" fill="#05D9E8" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Left child -->
  <circle cx="25" cy="65" r="10" fill="#FF2A6D" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Right child -->
  <circle cx="75" cy="65" r="10" fill="#F7E018" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Connection lines -->
  <path d="M 50 37 Q 50 50 25 55" stroke="#1A1A2E" stroke-width="3" fill="none"/>
  <path d="M 50 37 Q 50 50 75 55" stroke="#1A1A2E" stroke-width="3" fill="none"/>
  <path d="M 25 75 Q 50 85 75 75" stroke="#1A1A2E" stroke-width="2" fill="none"/>
  
  <!-- Circuit patterns on lines -->
  <circle cx="42" cy="46" r="2" fill="#05D9E8" opacity="0.5"/>
  <circle cx="58" cy="46" r="2" fill="#05D9E8" opacity="0.5"/>
  <circle cx="50" cy="80" r="1.5" fill="#F7E018" opacity="0.5"/>
</svg>
